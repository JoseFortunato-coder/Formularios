<!DOCTYPE html>
<html>
<head>
    <title>Cadastro de endereço</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #form-endereco {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: #1e3a5f;
            margin-bottom: 24px;
            font-size: 20px;
        }

        .campo {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .campo label {
            font-size: 14px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 6px;
        }

        .campo input {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
            color: #334155;
            transition: all 0.3s ease;
            background-color: #fff;
        }

        .campo input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .campo input[readonly] {
            background-color: #f1f5f9;
            color: #64748b;
            border-color: #e2e8f0;
            cursor: not-allowed;
        }

        .campo input.buscando {
            background-color: #fffbeb;
            border-color: #f59e0b;
            color: #92400e;
            font-style: italic;
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 10px;
        }

        button[type="submit"]:hover:not(:disabled) { background-color: #2563eb; }
        button[type="submit"]:active:not(:disabled) { background-color: #1d4ed8; }
        button[type="submit"]:disabled {
            background-color: #93c5fd;
            cursor: not-allowed;
        }

        #status-msg {
            margin-top: 14px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            min-height: 20px;
        }
        #status-msg.sucesso { color: #16a34a; }
        #status-msg.erro    { color: #dc2626; }
    </style>
</head>
<body>
    <form id="form-endereco">
        <h2>Cadastro de Endereço</h2>

        <div class="campo">
            <label for="cep">CEP:</label>
            <input type="text" id="cep" maxlength="9" placeholder="00000-000" required>
        </div>
        <div class="campo">
            <label for="rua">Rua/Logradouro:</label>
            <input type="text" id="rua" required>
        </div>
        <div class="campo">
            <label for="bairro">Bairro:</label>
            <input type="text" id="bairro" required>
        </div>
        <div class="campo">
            <label for="cidade">Cidade:</label>
            <input type="text" id="cidade" required>
        </div>
        <div class="campo">
            <label for="estado">Estado (UF):</label>
            <input type="text" id="estado" maxlength="2" placeholder="SP" required>
        </div>

        <button type="submit" id="btn-salvar">Gravar Cadastro</button>
        <div id="status-msg"></div>
    </form>

    <script>
        const camposAuto = ['rua', 'bairro', 'cidade', 'estado'];
        let estaBuscando = false;

        function setCamposReadonly(ativar) {
            camposAuto.forEach(id => { document.getElementById(id).readOnly = ativar; });
        }

        function limparCampos() {
            camposAuto.forEach(id => {
                const el = document.getElementById(id);
                el.value = '';
                el.readOnly = false;
                el.classList.remove('buscando');
                el.placeholder = '';
            });
        }

        function mostrarStatus(msg, tipo) {
            const el = document.getElementById('status-msg');
            el.textContent = msg;
            el.className = tipo;
            if (tipo === 'sucesso') {
                setTimeout(() => { el.textContent = ''; el.className = ''; }, 4000);
            }
        }

        async function buscarCep(valor) {
            const cep = valor.replace(/\D/g, '');
            if (cep.length !== 8) return false;

            estaBuscando = true;
            document.getElementById('btn-salvar').disabled = true;

            camposAuto.forEach(id => {
                const el = document.getElementById(id);
                el.value = '';
                el.placeholder = 'Buscando...';
                el.classList.add('buscando');
                el.readOnly = true;
            });

            try {
                const resposta = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const dados = await resposta.json();

                camposAuto.forEach(id => {
                    document.getElementById(id).classList.remove('buscando');
                    document.getElementById(id).placeholder = '';
                });

                if (dados.erro) {
                    alert('CEP não encontrado.');
                    limparCampos();
                    return false;
                }

                document.getElementById('rua').value    = dados.logradouro;
                document.getElementById('bairro').value = dados.bairro;
                document.getElementById('cidade').value = dados.localidade;
                document.getElementById('estado').value = dados.uf;
                setCamposReadonly(true);
                return true;

            } catch (_) {
                camposAuto.forEach(id => {
                    document.getElementById(id).classList.remove('buscando');
                    document.getElementById(id).placeholder = '';
                });
                limparCampos();
                alert('Erro ao buscar o CEP. Verifique sua conexão.');
                return false;

            } finally {
                estaBuscando = false;
                document.getElementById('btn-salvar').disabled = false;
            }
        }

        document.getElementById('cep').addEventListener('input', function (e) {
            let valor = e.target.value.replace(/\D/g, '');
            if (valor.length > 5) valor = valor.substring(0, 5) + '-' + valor.substring(5, 8);
            e.target.value = valor;
        });

        document.getElementById('cep').addEventListener('blur', async function () {
            const cep = this.value.replace(/\D/g, '');
            if (cep.length !== 8) {
                if (this.value !== '') { alert('CEP inválido. Digite 8 números.'); limparCampos(); }
                return;
            }
            await buscarCep(this.value);
        });

        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby5dGZ0I4s5gB0ZYe3qhRGInYi0haebzo26fRSVtsYzkSbKqlCEVm4U9Z_Avq1el5FW/exec';

        document.getElementById('form-endereco').addEventListener('submit', async function (e) {
            e.preventDefault();

            if (estaBuscando) return;

            if (!document.getElementById('rua').value) {
                const ok = await buscarCep(document.getElementById('cep').value);
                if (!ok) return;
            }

            const btn = document.getElementById('btn-salvar');
            btn.disabled = true;
            btn.textContent = 'Salvando...';
            mostrarStatus('', '');

            const dados = {
                cep:    document.getElementById('cep').value,
                rua:    document.getElementById('rua').value,
                bairro: document.getElementById('bairro').value,
                cidade: document.getElementById('cidade').value,
                estado: document.getElementById('estado').value
            };

            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams(dados)
                });

                mostrarStatus('✅ Cadastro salvo com sucesso!', 'sucesso');
                document.getElementById('form-endereco').reset();
                setCamposReadonly(false);

            } catch (erro) {
                mostrarStatus('❌ Erro de conexão. Tente novamente.', 'erro');
                console.error(erro);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Gravar Cadastro';
            }
        });
    </script>
</body>
</html>
